name: Build Staging

on:
  push:
    branches: [main]

jobs:
  build:
    name: EAS Build (staging APK) + Firebase Distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build staging APK
        run: eas build --platform android --profile staging --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Download APK artifact
        run: |
          APK_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          curl -L "$APK_URL" -o smarty-steps-staging.apk

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: smarty-steps-staging.apk
          releaseNotes: "Staging build from ${{ github.sha }}"
